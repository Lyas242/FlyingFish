rules:
  - !SHARDING
    tables:
      d_order:
        actualDataNodes: ds_${0..1}.d_order_${0..7}
        databaseStrategy:
          hint:
            shardingAlgorithmName: database-order-hint-algorithm
        tableStrategy:
          hint:
            shardingAlgorithmName: table-order-hint-algorithm
    broadcastTables:
      - d_sharding_route_mapping
    
    shardingAlgorithms:
      database-order-hint-algorithm:
        type: CLASS_BASED
        props:
          strategy: HINT
          algorithmClassName: com.damai.shardingsphere.algorithm.DatabaseOrderHintShardingAlgorithm
      table-order-hint-algorithm:
        type: CLASS_BASED
        props:
          strategy: HINT
          algorithmClassName: com.damai.shardingsphere.algorithm.TableOrderHintShardingAlgorithm
